    <div id="map" style="height: 930px;"></div>

<script>var map = L.map('map').setView([-37.320619, -59.13271], 13);</script>

<script>L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {

<script>
    var popup = L.popup();

function onMapClick(e) {
    popup
        .setLatLng(e.latlng)
        .setContent("Coordenadas: " + e.latlng.toString())
        .openOn(map);
}
map.on('click', onMapClick);
</script>

<!-- //////////////////////////////////////////////////////////////////////////// -->

<script>
    var polygon = L.polygon([
    [-34.6037, -58.3816],
    [-35.6037, -59.5],
    [-37.307608, -59.10806],
    [-38.540647, -62.604218],
    [-42.769532, -65.031477],
    [-35.5, -65.5]
]).addTo(map);
</script>

<script>
var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
});

var map = L.map('map', {
    center: [39.73, -104.99],
    zoom: 10,
    layers: [osm, cities]
});
</script>
<script>
    var baseMaps = {

};

var overlayMaps = {
    "Ciudades": cities
};
</script>
<script>
    var layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);

<script>
    var baseMaps = {

<!-- //////////////////////////////////////////////////////////////////////////// -->

<script>
var LeafIcon = L.Icon.extend({
    options: {
        shadowUrl: 'img/shadow-point.png',
        iconSize:     [10, 100],
        shadowSize:   [10, 100],
        iconAnchor:   [7, 94],
        shadowAnchor: [5, 92],
        popupAnchor:  [-3, -76]
    }
});
var greenIcon = new LeafIcon({iconUrl: 'img/green-point.png'}),
    redIcon = new LeafIcon({iconUrl: 'img/red-point.png'}),
    yellowIcon = new LeafIcon({iconUrl: 'img/yellow-point.png'});
    blueIcon = new LeafIcon({iconUrl: 'img/blue-point.png'});
    purpleIcon = new LeafIcon({iconUrl: 'img/purple-point.png'});
  
    L.icon = function (options) {
    return new L.Icon(options);
};
</script>

<script>
    L.marker([-34.6037, -58.38], {icon: greenIcon}).addTo(map).bindPopup("VERDE.");
    L.marker([-42.769532, -65.031477], {icon: yellowIcon}).addTo(map).bindPopup("AMARILLO (CHEN!).");
    L.marker([-37.307608, -59.10806], {icon: redIcon}).addTo(map).bindPopup("ROJO (Mi casa!).");
    L.marker([-38.540647, -62.604218], {icon: purpleIcon}).addTo(map).bindPopup("Morado.");
    L.marker([-34.6037, -58.41], {icon: blueIcon}).addTo(map).bindPopup("AZUL.");
</script>

<!-- //////////////////////////////////////////////////////////////////////////// -->

<script>
map.locate({setView: true, maxZoom: 16});
function onLocationFound(e) {
    var radius = e.accuracy;
    L.marker(e.latlng).addTo(map)
        .bindPopup("Estas dentro de un radio de " + radius + " metros desde este punto.").openPopup();

    L.circle(e.latlng, radius).addTo(map);
}

map.on('locationfound', onLocationFound);

function onLocationError(e) {
    alert(e.message);
}

map.on('locationerror', onLocationError);
</script>
